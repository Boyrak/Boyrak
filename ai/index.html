<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI StoryFlow - Scene Prompt Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-overlay"></div>

    <div class="container">
        <header>
            <h1>AI StoryFlow</h1>
            <p>បង្កើត Prompt សាច់រឿងតៗគ្នាសម្រាប់ Video AI (8s per Scene)</p>
        </header>

        <main>
            <section class="config-section">
                <div class="input-group">
                    <label for="story-theme">ប្រធានបទសាច់រឿង (Story Theme)</label>
                    <textarea id="story-theme"
                        placeholder="ឧទាហរណ៍៖ បុរសម្នាក់ដើរក្នុងព្រៃមន្តអាគម ហើយជួបខ្លានាគ..."></textarea>
                </div>

                <div class="controls">
                    <div class="control-item">
                        <label for="scene-count">ចំនួន Scene</label>
                        <input type="number" id="scene-count" value="3" min="1" max="10">
                    </div>
                    <div class="control-item">
                        <label for="scene-duration">រយៈពេលក្នុងមួយ Scene (s)</label>
                        <input type="number" id="scene-duration" value="8" readonly>
                    </div>
                    <button id="generate-btn" class="primary-btn">បង្កើតសាច់រឿង (Generate)</button>
                </div>
            </section>

            <section id="output-section" class="output-section hidden">
                <div class="output-header">
                    <h2>លទ្ធផលសាច់រឿង (Generated Sequence)</h2>
                    <button id="restart-btn" class="secondary-btn">ចាប់ផ្ដើមថ្មី</button>
                </div>
                <div id="scenes-container">
                    <!-- Scenes will be injected here -->
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 AI StoryFlow Designer - Created by RAK</p>
        </footer>
    </div>

    <!-- Modal for Copying -->
    <div id="toast" class="toast hidden">Prompt copied!</div>

    <script src="script.js"></script>
</body>

</html>
